version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: keske-postgres
    environment:
      POSTGRES_DB: keskealsaydim
      POSTGRES_USER: keske
      POSTGRES_PASSWORD: keske_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keske -d keskealsaydim"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keske-network

  redis:
    image: redis:7-alpine
    container_name: keske-redis
    command: redis-server --appendonly yes --requirepass redis_secret_2024
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - keske-network

  data-service:
    build:
      context: ./data-service
      dockerfile: Dockerfile
    container_name: keske-data-service
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=redis_secret_2024
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - keske-network

networks:
  keske-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
